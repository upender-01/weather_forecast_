<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <div class="search-container">
                <input type="text" id="city-input" placeholder="Enter city name..." aria-label="Search city">
                <button id="search-btn">Search</button>
            </div>
            <div id="recent-searches" class="recent-searches">
                </div>
        </header>

        <main>
            <div id="loading" class="hidden">Fetching weather data... ⏳</div>
            <div id="error-message" class="hidden error"></div>

            <section id="current-weather" class="hidden">
                <h2 id="city-name">City Name</h2>
                <div class="weather-main">
                    <img id="weather-icon" src="" alt="Weather icon">
                    <h3 id="temperature">--°C</h3>
                </div>
                <p id="weather-description" class="capitalize">--</p>
                <div class="weather-details">
                    <p>💧 Humidity: <span id="humidity">--</span>%</p>
                    <p>💨 Wind: <span id="wind-speed">--</span> m/s</p>
                </div>
            </section>

            <section id="forecast" class="hidden">
                <h3>5-Day Forecast</h3>
                <div class="forecast-container" id="forecast-container">
                    </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
